<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveOS ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div id="stars"></div>
<div id="petals"></div>
<div id="hearts"></div>

<header class="topbar">

    <div class="logo">
        ❤️ LoveOS
    </div>

    <div class="status">

        <div>
            <span>STATUS</span>
            <strong>ONLINE</strong>
        </div>

        <div>
            <span>SECURITY</span>
            <strong>AES-256</strong>
        </div>

        <div>
            <span>VERSION</span>
            <strong>5.0</strong>
        </div>

    </div>

</header>

<section class="hero">

    <div class="glass">

        <h1>Hasta el Infinito ♾️❤️</h1>

        <p>
            No es una simple carta...
            Es un pequeño universo que construí únicamente para ti.
        </p>

        <button id="openLetter">
            ❤️ Abrir Carta
        </button>

    </div>

</section>

<section id="letterWindow" class="window hidden">

    <div class="window-bar">

        <div class="dots">
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="green"></span>
        </div>

        <div class="filename">
            carta_encriptada.txt
        </div>

    </div>

    <div class="letter">

        <h2>Para Ti ❤️</h2>

        <div id="letterContent"></div>

    </div>

</section>

<footer>

Hecho con ❤️ exclusivamente para ti.

</footer>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
